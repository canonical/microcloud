name: Vulnerability Scanning with Trivy
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # Test Trivy daily at midnight

permissions:
  contents: read
  security-events: write # for uploading SARIF results to the security tab

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  trivy-repo:
    name: Trivy - Repository
    runs-on: ubuntu-slim
    if: ${{ github.ref_name == 'main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: sarif
          severity: LOW,MEDIUM,HIGH,CRITICAL
          output: trivy-microcloud-repo-scan-results.sarif

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v3.29.5
        with:
          sarif_file: "trivy-microcloud-repo-scan-results.sarif"
          sha: ${{ github.sha }}
          ref: refs/heads/main

  trivy-snap:
    name: Trivy - Snap
    runs-on: ubuntu-slim
    if: ${{ github.ref_name == 'main' }}
    needs: trivy-repo
    strategy:
      matrix:
        include:
          - channel: "3/edge"
            branch: "main"
          - channel: "2/stable"
            branch: "v2-edge"
          - channel: "1/stable"
            branch: "v1-edge"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ matrix.branch }}

      - name: Install snapd
        run: |
          sudo apt-get install --no-install-recommends -y snapd

      - name: Download snap for scan
        run: |
          snap download microcloud --channel=${{ matrix.channel }}
          unsquashfs ./microcloud*.snap

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: rootfs
          scan-ref: squashfs-root
          scanners: vuln,secret,misconfig
          format: sarif
          severity: LOW,MEDIUM,HIGH,CRITICAL
          output: snap-scan-results.sarif

      - name: Flag snap scanning alerts
        run: |
          jq '.runs[].tool.driver.rules[] |= (.shortDescription.text |= "Snap scan - " + .)' snap-scan-results.sarif > tmp.json
          mv tmp.json snap-scan-results.sarif

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v3.29.5
        with:
          sarif_file: "snap-scan-results.sarif"
          sha: ${{ github.sha }}
          ref: refs/heads/${{ matrix.branch }}
